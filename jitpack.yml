jdk:
  - openjdk17

before_install:
  - chmod +x gradlew
  - sdk install java 25.0.1-tem || sdk install java 25.0.0-tem || sdk install java 25-open
  - sdk use java 25.0.1-tem || sdk use java 25.0.0-tem || sdk use java 25-open
  - java -version

install:
  - export JAVA_HOME="$HOME/.sdkman/candidates/java/current" && export PATH="$JAVA_HOME/bin:$PATH" && ./gradlew build publishToMavenLocal --no-problems-report
